services:
  # ==========================================
  # 1. AI INFRASTRUCTURE (The Foundation)
  # ==========================================

  ollama:
    image: ollama/ollama:latest
    container_name: documind-llm
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - documind-net

  # The Installer (Fixed Syntax)
  init-ollama:
    image: curlimages/curl:latest
    container_name: documind-init-ollama
    depends_on:
      - ollama
    # 🔴 CHANGED: Used '|' to preserve newlines and removed '#' comments to prevent syntax errors
    command: |
      /bin/sh -c "
      echo '⏳ [INIT] Waiting for Ollama Service to be ready...';
      until curl -s -o /dev/null http://ollama:11434/api/tags; do
        echo '... waiting for ollama server ...';
        sleep 2;
      done;
      echo '✅ [INIT] Ollama Service is Online!';
      echo '🔍 [INIT] Checking for qwen2.5:7b...';
      if curl -s http://ollama:11434/api/tags | grep -q 'qwen2.5:7b'; then
        echo '✅ [INIT] Model found! Setup complete.';
        exit 0;
      fi;
      echo '⬇️  [INIT] Model NOT found. Starting download (approx 4.7GB)...';
      echo '⚠️  [INIT] This will take a few minutes. Please wait...';
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:7b\", \"stream\": false}';
      echo '✅ [INIT] Download Finished Successfully!';
      "
    networks:
      - documind-net

  # ==========================================
  # 2. DATABASES
  # ==========================================
  redis:
    image: redis:alpine
    container_name: documind-redis
    networks:
      - documind-net

  neo4j:
    image: neo4j:latest
    container_name: documind-graph
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
    networks:
      - documind-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: documind-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - documind-net

  minio:
    image: minio/minio:latest
    container_name: documind-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - documind-net

  init-minio:
    image: minio/mc:latest
    container_name: documind-init-minio
    depends_on:
      - minio
    entrypoint: /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb local/documind-uploads --ignore-existing;
      echo 'Bucket ready';
      "
    networks:
      - documind-net

  # ==========================================
  # 3. BACKEND SERVICES
  # ==========================================
  backend:
    build: ./backend
    container_name: documind-backend
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      init-ollama:
        condition: service_completed_successfully
      minio:
        condition: service_started
    networks:
      - documind-net

  worker:
    build: ./backend
    container_name: documind-worker
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    command: celery -A celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_started
      init-ollama:
        condition: service_completed_successfully
      minio:
        condition: service_started
    networks:
      - documind-net

  # ==========================================
  # 4. FRONTEND
  # ==========================================
  frontend:
    build: ./frontend
    container_name: documind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - documind-net

volumes:
  ollama_storage:
  neo4j_data:
  qdrant_storage:
  minio_data:

networks:
  documind-net:
    driver: bridge
