# NOTE: docker-compose is for local development only.
# Production runs on Kubernetes — use `make setup` instead.
# If using docker-compose, fill in NVIDIA_API_KEY and LLAMA_CLOUD_API_KEY in .env first.

services:
  # ==========================================
  # 1. DATABASES
  # ==========================================
  redis:
    image: redis:alpine
    container_name: documind-redis
    networks:
      - documind-net

  neo4j:
    image: neo4j:latest
    container_name: documind-graph
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
    networks:
      - documind-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: documind-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - documind-net

  minio:
    image: minio/minio:latest
    container_name: documind-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - documind-net

  init-minio:
    image: minio/mc:latest
    container_name: documind-init-minio
    depends_on:
      - minio
    entrypoint: /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb local/documind-uploads --ignore-existing;
      echo 'Bucket ready';
      "
    networks:
      - documind-net

  # ==========================================
  # 2. BACKEND SERVICES
  # ==========================================
  backend:
    build: ./backend
    container_name: documind-backend
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - documind-net

  worker:
    build: ./backend
    container_name: documind-worker
    env_file: .env
    command: celery -A celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - documind-net

  # ==========================================
  # 3. FRONTEND
  # ==========================================
  frontend:
    build: ./frontend
    container_name: documind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - documind-net

volumes:
  neo4j_data:
  qdrant_storage:
  minio_data:

networks:
  documind-net:
    driver: bridge
