# ─── DEPLOYMENT: Celery Worker ─────────────────────────────────
#
# WHAT THIS REPLACES from docker-compose:
#   worker:
#     build: ./backend
#     command: celery -A celery_app.celery_app worker --loglevel=info
#     env_file: .env
#     depends_on: [redis, init-ollama]
#
# KEY DIFFERENCES IN K8S:
# - Same image as FastAPI, different CMD (via 'command' override)
# - Uses same ConfigMap & Secret (shared config)
# - No depends_on — K8s handles startup order via readiness probes
# ────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        component: backend
    spec:
      containers:
      - name: worker
        image: documind-fastapi:v1.1
        imagePullPolicy: Never

        command: ["celery"]
        args:
          - "-A"
          - "celery_app.celery_app"
          - "worker"
          - "--loglevel=info"
          - "--concurrency=1"
          - "--pool=solo"

        envFrom:
        - configMapRef:
            name: documind-config
        - secretRef:
            name: documind-secrets
        - secretRef:
            name: minio-credentials
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_password

        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "2000m"

        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: model-cache
          mountPath: /root/.cache/huggingface

      volumes:
      - name: uploads
        emptyDir: {}
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache