# ─── DEPLOYMENT: Celery Worker ─────────────────────────────────
# Same image as FastAPI, different command.
# Uses same ConfigMap and Secret (shared config).
#
# IMAGE NOTE: image tag must be rebuilt to reflect the API stack
# upgrade (sentence-transformers removed, NVIDIA NIM added).
# Build and load before applying:
#   docker build -t documind-fastapi:v2.0 .
#   minikube image load documind-fastapi:v2.0
# Then update the image field below to match.
# ────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        component: backend
    spec:
      containers:
      - name: worker
        image: documind-fastapi:v1.1
        imagePullPolicy: Never

        command: ["celery"]
        args:
          - "-A"
          - "celery_app.celery_app"
          - "worker"
          - "--loglevel=info"
          - "--concurrency=1"
          - "--pool=solo"

        envFrom:
        - configMapRef:
            name: documind-config
        - secretRef:
            name: documind-secrets
        - secretRef:
            name: minio-credentials
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_password

        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "2000m"

        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: model-cache
          mountPath: /root/.cache/huggingface

        # model-cache caches bge-small-en-v1.5 (Chonkie) and unstructured
        # vision models across pod restarts via the model-cache PVC.

      volumes:
      - name: uploads
        emptyDir: {}
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
