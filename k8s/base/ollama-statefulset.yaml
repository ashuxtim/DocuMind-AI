# ─── STATEFULSET: Ollama Local LLM ────────────────────────────
#
# Ollama serves local LLM inference (qwen2.5:7b) for DocuMind's
# RAG pipeline, graph building, and document summarization.
#
# WHY STATEFULSET?
# - Stable pod identity (ollama-0) for predictable debugging
# - volumeClaimTemplates auto-creates a PVC for model storage
# - Models are large (4-7GB) — we CANNOT lose them on restart
#
# WHY INIT CONTAINER?
# - Ollama starts empty — the model must be pulled before serving
# - Init container runs "ollama pull qwen2.5:7b" to completion
# - Only after pull succeeds does the main Ollama server start
# - Same role as "init-ollama" in your docker-compose.yml
#
# RESOURCE NOTE (Ryzen 7530U, 16GB RAM):
# qwen2.5:7b requires ~5-6GB RAM for inference.
# We request 6Gi and limit at 10Gi to leave room for other pods.
# CPU inference is slow (~3-5 tokens/sec) but works correctly.
# ────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  labels:
    app: ollama
    component: llm
spec:
  serviceName: ollama-headless     # Must match headless service name
  replicas: 0                      # One Ollama instance — single GPU/CPU node
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        component: llm
    spec:

      # ── INIT CONTAINER: Pull the model before serving ──────────
      # This runs to COMPLETION before the main "ollama" container starts.
      # It ensures qwen2.5:7b is fully downloaded and available on the PVC.
      #
      # HOW IT WORKS:
      # 1. Init container mounts the same /root/.ollama volume as the main container
      # 2. Starts a temporary Ollama server in the background (needed for pull API)
      # 3. Waits until the server is ready
      # 4. Runs "ollama pull qwen2.5:7b" — downloads to /root/.ollama/models/
      # 5. Kills the temp server
      # 6. Init container exits with code 0 → main container starts
      #
      # ON RESTART: If /root/.ollama/models already has the model (PVC survived),
      # the pull is a no-op (Ollama detects existing model). Fast restart.
      initContainers:
      - name: init-pull-model
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            # Install curl if not present
            if ! command -v curl > /dev/null 2>&1; then
              echo "⏳ [INIT] Installing curl..."
              apt-get update -qq && apt-get install -y -qq curl
              echo "✅ [INIT] curl installed"
            fi
            
            echo "⏳ [INIT] Starting temporary Ollama server for model pull..."
            ollama serve &
            OLLAMA_PID=$!

            echo "⏳ [INIT] Waiting for Ollama API to be ready..."
            until curl -s -o /dev/null http://localhost:11434/api/tags; do
              echo "... waiting for Ollama server ..."
              sleep 3
            done
            echo "✅ [INIT] Ollama API is ready!"

            echo "⏳ [INIT] Checking if qwen2.5:7b is already downloaded..."
            if curl -s http://localhost:11434/api/tags | grep -q "qwen2.5:7b"; then
              echo "✅ [INIT] qwen2.5:7b already present — skipping download."
            else
              echo "⬇️  [INIT] Pulling qwen2.5:7b (this may take several minutes on first run)..."
              ollama pull qwen2.5:7b
              echo "✅ [INIT] qwen2.5:7b pull complete!"
            fi

            echo "🛑 [INIT] Shutting down temporary server..."
            kill $OLLAMA_PID
            wait $OLLAMA_PID 2>/dev/null
            echo "✅ [INIT] Init complete. Main container will now start."

        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama   # Same path as main container — shares the PVC

        resources:
          requests:
            memory: "512Mi"          # Init container just pulls — low RAM
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

      # ── MAIN CONTAINER: Ollama Server ──────────────────────────
      containers:
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent

        ports:
        - name: api
          containerPort: 11434
          protocol: TCP

        # ── ENVIRONMENT ──
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0"          # Listen on all interfaces (not just localhost)
                                     # Required for K8s pod networking — without this,
                                     # Ollama only listens on 127.0.0.1 inside the pod
                                     # and the Service cannot reach it!

        - name: OLLAMA_KEEP_ALIVE
          value: "24h"              # Keep model loaded in RAM for 24 hours
                                     # Without this, Ollama unloads after 5 minutes of inactivity
                                     # and the next request takes 30+ seconds to reload

        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"                # Only keep 1 model loaded (RAM constraint)

        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama  # Model storage — must survive pod restarts

        resources:
          requests:
            memory: "6Gi"           # qwen2.5:7b needs ~5-6GB RAM
            cpu: "500m"             # CPU inference — slow but functional
          limits:
            memory: "10Gi"          # Allow spikes during inference
            cpu: "2000m"            # 2 CPU cores for inference

        # ── HEALTH PROBES ──
        # CRITICAL: These must have generous timings.
        # Ollama takes 60-120 seconds to load the model on first start.
        # If probes fire too early, K8s kills Ollama before it's ready.
        livenessProbe:
          httpGet:
            path: /api/tags         # Returns list of available models
            port: 11434
          initialDelaySeconds: 120  # Wait 2 minutes before first liveness check
          periodSeconds: 30         # Check every 30 seconds (model loading is slow)
          timeoutSeconds: 10
          failureThreshold: 5       # Allow 5 failures before restarting

        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 60   # Start readiness checks after 60s
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3

  # ── VOLUME CLAIM TEMPLATE ──
  # Auto-creates a PVC named "ollama-data-ollama-0" for the pod.
  # This survives pod restarts — model is only downloaded once.
  volumeClaimTemplates:
  - metadata:
      name: ollama-data
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: standard
      resources:
        requests:
          storage: 15Gi             # qwen2.5:7b is ~4.7GB. 15Gi gives room for
                                     # future model upgrades without re-provisioning.