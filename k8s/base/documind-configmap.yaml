# ─── CONFIGMAP: DocuMind Shared Configuration ──────────────────
# Stores non-sensitive config shared across FastAPI and Celery.
# API keys are NOT stored here — use documind-secrets.
# ────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: documind-config
  labels:
    app: documind
data:
  # ── Service Discovery (K8s DNS names) ──
  REDIS_URL: "redis://redis-service:6379/0"
  NEO4J_URI: "bolt://neo4j-service:7687"
  NEO4J_USER: "neo4j"
  QDRANT_HOST: "qdrant-service"
  QDRANT_PORT: "6333"
  QDRANT_GRPC_PORT: "6334"

  # ── Primary LLM (reasoning, generation, audit) ──
  # Powers query decomposition, answer generation, and audit stages.
  # NVIDIA is the primary provider — also powers embeddings + reranker
  # regardless of LLM_PROVIDER setting.
  # Anthropic is explicit-only — auto-detect will never land on it.
  #
  # Auto-detect priority (when LLM_PROVIDER=auto):
  #   NVIDIA → GROQ → GEMINI → OPENAI
  LLM_PROVIDER: "nvidia"
  NVIDIA_MODEL: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  EMBED_MODEL: "nvidia/nv-embed-v1"
  EMBED_DIM: "4096"
  RERANK_MODEL: "nvidia/llama-nemotron-rerank-1b-v2"
  GROQ_MODEL: "qwen/qwen3-32b"
  GEMINI_MODEL: "gemini-2.5-flash"
  OPENAI_MODEL: "gpt-4o"
  ANTHROPIC_MODEL: "claude-sonnet-4-6"

  # ── Extraction LLM (graph extraction, coref, edge normalisation) ──
  # Separate model for structured JSON output tasks — faster and cheaper
  # than the primary reasoning model for this workload.
  # Uses same NVIDIA_API_KEY as primary — no extra secret needed.
  #
  # EXTRACTION_MODEL is a flat override — no per-provider model variants.
  # If EXTRACTION_LLM_PROVIDER is not set, extraction falls back to primary.
  #
  # To disable dual-model and use primary for everything:
  #   comment out both EXTRACTION_* lines below.
  STRUCTURED_LLM_PROVIDER: "nvidia"
  STRUCTURED_MODEL: "qwen/qwen2.5-coder-32b-instruct"
  AUDIT_MODEL: "meta/llama-3.1-70b-instruct"

  # ── NVIDIA NIM Embedding + Reranker ──
  # Always NVIDIA regardless of LLM_PROVIDER.
  # Model IDs baked into vector_store.py and agent_graph.py.
  # Listed here for visibility — changing them requires code changes.
  # EMBED_MODEL: nvidia/llama-nemotron-embed-1b-v2  (2048-dim)
  # RERANK_MODEL: nvidia/llama-nemotron-rerank-1b-v2

  # ── Context Window ──
  # Maximum document context chars passed to the LLM.
  # Default 60K is safe for all providers including Groq (Qwen3-32B: ~24K char budget).
  # Increase for providers with larger context windows:
  #   NVIDIA nemotron-super (NIM API cap 256K tokens): up to ~190K chars
  #   Anthropic Sonnet 4.6 (200K tokens):              up to ~150K chars
  #   Gemini 2.5 Flash (1M tokens):                    up to ~750K chars
  #   Groq Qwen3-32B (32K tokens):                     do not exceed ~20K chars
  AGENT_MAX_CONTEXT_CHARS: "60000"
  QUERY_TIMEOUT_S: "300"

  # ── Retrieval Thresholds ──
  # Tune after re-ingest without code changes.
  # AGENT_MIN_RERANK_SCORE: logit threshold for NVIDIA reranker (-5.0 default)
  # AGENT_MIN_VECTOR_SCORE: cosine similarity threshold for Qdrant (0.30 default)
  AGENT_MIN_RERANK_SCORE: "-15.0"
  AGENT_MIN_VECTOR_SCORE: "0.30"

  # ── MinIO (Object Storage) ──
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET: "documind-uploads"
  MINIO_USE_SSL: "false"
  UPLOAD_FOLDER: "./uploads"

  HF_HUB_OFFLINE: "1"

  # ── Observability ──
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_ENDPOINT: "https://api.smith.langchain.com"
  LANGCHAIN_PROJECT: "DocuMind_K8s"
