# ─── CONFIGMAP: DocuMind Shared Configuration ──────────────────
# Stores non-sensitive config shared across FastAPI and Celery.
#
# WHAT THIS REPLACES:
# The hardcoded 'env:' values in fastapi-deployment.yaml AND
# the .env file from docker-compose.
#
# WHY IT'S BETTER:
# - Single source of truth (change once, all pods pick it up)
# - Can be updated without rebuilding Docker images
# - K8s tracks revision history
# ────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: documind-config
  labels:
    app: documind
data:
  # ── Service Discovery (K8s DNS names) ──
  # These match the Service names you'll create for each database.
  # In K8s, "redis-service" resolves to the ClusterIP of the Redis Service.
  REDIS_URL: "redis://redis-service:6379/0"
  NEO4J_URI: "bolt://neo4j-service:7687"
  NEO4J_USER: "neo4j"
  QDRANT_HOST: "qdrant-service"
  QDRANT_PORT: "6333"
  
  # ── LLM Configuration ──
  # Priority chain order for automatic fallback:
  # 1. GROQ       (if GROQ_API_KEY in env)
  # 2. GEMINI     (elif GEMINI_API_KEY in env)
  # 3. OPENAI     (elif OPENAI_API_KEY in env)
  # 4. VLLM       (elif VLLM_BASE_URL in env)
  # 5. OLLAMA     (final fallback)
  # Override this explicitly by setting LLM_PROVIDER to a specific provider.
  # 
  # IMPORTANT: Do not store API keys here.
  # Create a K8s secret and mount it in deployments:
  # kubectl create secret generic documind-secrets --from-literal=GROQ_API_KEY=your_key_here
  LLM_PROVIDER: "auto"
  GROQ_MODEL: "qwen/qwen3-32b"
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  OLLAMA_MODEL: "auto"
  
  UPLOAD_FOLDER: "./uploads"
  # ── MinIO (Object Storage) ──
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET: "documind-uploads"
  MINIO_USE_SSL: "false"


  # ── Observability ──
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_ENDPOINT: "https://api.smith.langchain.com"
  LANGCHAIN_PROJECT: "DocuMind_K8s"
