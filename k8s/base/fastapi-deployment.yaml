# ─── DEPLOYMENT: DocuMind FastAPI Backend ───────────────────────
# UPDATED: Now uses ConfigMap and Secret instead of hardcoded env vars.
# ────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  labels:
    app: fastapi
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
        component: backend
    spec:
      containers:
      - name: fastapi
        image: documind-fastapi:v1.1
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        # ── ENVIRONMENT FROM CONFIGMAP & SECRET ──
        # envFrom injects ALL keys from the ConfigMap/Secret as env vars.
        # This replaces the manual "env:" list from Phase 2.
        #
        # BEFORE (Phase 2):
        #   env:
        #     - name: REDIS_URL
        #       value: "redis://redis-service:6379/0"  ← Hardcoded
        #
        # AFTER (Phase 3):
        #   envFrom:
        #     - configMapRef: documind-config  ← All keys become env vars
        envFrom:
        - configMapRef:
            name: documind-config
        - secretRef:
            name: documind-secrets
        - secretRef:
            name: minio-credentials
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_password

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2