# ─── DEPLOYMENT: DocuMind FastAPI Backend ───────────────────────
# Uses ConfigMap and Secret for all configuration.
#
# IMAGE NOTE: image tag must be rebuilt to reflect the API stack
# upgrade (sentence-transformers removed, NVIDIA NIM added).
# Build and load before applying:
#   docker build -t documind-fastapi:v2.0 .
#   minikube image load documind-fastapi:v2.0
# Then update the image field below to match.
# ────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  labels:
    app: fastapi
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
        component: backend
    spec:
      containers:
      - name: fastapi
        image: documind-fastapi:v1.1
        imagePullPolicy: Never

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        envFrom:
        - configMapRef:
            name: documind-config
        - secretRef:
            name: documind-secrets
        - secretRef:
            name: minio-credentials
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root_password

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface

      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
